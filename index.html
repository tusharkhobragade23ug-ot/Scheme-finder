<!DOCTYPE html>
<html>
<head>
  <title>Scheme Finder</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="container mt-5">

<h1 class="mb-4">Maharashtra Government Scheme Finder</h1>

<p class="text-center text-muted mb-2">
  This website is for educational purposes only.
</p>

<p class="text-center text-muted mb-4">
  Find government schemes based on your income, caste, and occupation.
</p>

<div class="mb-3">
  <label class="form-label">Income:</label>
  <input type="number" id="income" class="form-control">
</div>

<div class="mb-3">
  <label class="form-label">Caste Category:</label>
  <select id="caste" class="form-select">
    <option value="general">General</option>
    <option value="obc">OBC</option>
    <option value="sc">SC</option>
    <option value="st">ST</option>
    <option value="vjnt">VJNT</option>
  </select>
</div>

<div class="mb-3">
  <label class="form-label">Occupation:</label>
  <select id="occupation" class="form-select">
    <option value="student">Student</option>
    <option value="farmer">Farmer</option>
  </select>
</div>

<button class="btn btn-primary mb-3" onclick="findSchemes()">Find Schemes</button>

<h2>Results:</h2>
<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
