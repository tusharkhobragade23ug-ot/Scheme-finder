<!DOCTYPE html>
<html>
<head>
  <title>Scheme Finder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="container mt-5">

<h1 class="text-center">Maharashtra Government Scheme Finder</h1>
<p class="text-center text-muted">Enter your details to find eligible schemes</p>

<div class="card p-4 shadow-sm">

  <!-- Income -->
  <div class="mb-3">
    <label>Income:</label>
    <input type="number" id="income" class="form-control">
  </div>

  <!-- Caste -->
  <div class="mb-3">
    <label>Caste:</label>
    <select id="caste" class="form-select">
      <option value="">Select</option>
      <option value="general">General</option>
      <option value="obc">OBC</option>
      <option value="sc">SC</option>
      <option value="st">ST</option>
      <option value="vjnt">VJNT</option>
    </select>
  </div>

  <!-- Disability -->
  <div class="mb-3">
    <label>Disability:</label>
    <select id="disability" class="form-select">
      <option value="">Select</option>
      <option value="no">No</option>
      <option value="yes">Yes</option>
    </select>
  </div>

  <!-- Occupation -->
  <div class="mb-3">
    <label>Occupation:</label>
    <select id="occupation" class="form-select">
      <option value="">Select</option>
      <option value="student">Student</option>
      <option value="farmer">Farmer</option>
    </select>
  </div>

  <!-- Gender -->
  <div class="mb-3">
    <label>Gender:</label>
    <select id="gender" class="form-select">
      <option value="">Select</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>
  </div>

  <!-- Ration Category -->
  <div class="mb-3">
    <label>Ration Category:</label>
    <select id="ration" class="form-select">
      <option value="">Select</option>
      <option value="bpl">BPL</option>
      <option value="apl">APL</option>
      <option value="aay">AAY</option>
      <option value="phh">PHH</option>
    </select>
  </div>

  <!-- Category -->
  <div class="mb-3">
    <label>Category:</label>
    <select id="category" class="form-select">
      <option value="">Select</option>
      <option value="education">Education</option>
      <option value="farmer">Farmer</option>
      <option value="women">Women</option>
      <option value="housing">Housing</option>
      <option value="financial">Financial</option>
      <option value="social">Social</option>
    </select>
  </div>

  <div class="d-grid gap-2">
  <button class="btn btn-primary" onclick="findSchemes()">
    Find Schemes
  </button>

  <button class="btn btn-secondary" onclick="resetFilters()">
    Reset Filters
  </button>

</div>

<h3 class="mt-4">Results</h3>
<div id="result"></div>

<hr class="mt-5">

<h3>Feedback</h3>

<div class="card p-4 shadow-sm">

  <div class="mb-3">
    <label>Your Name (optional):</label>
    <input type="text" id="username" class="form-control">
  </div>

  <div class="mb-3">
    <label>Your Feedback:</label>
    <textarea id="feedback" class="form-control" rows="3"></textarea>
  </div>

  <button class="btn btn-success" onclick="submitFeedback()">
    Submit Feedback
  </button>

  <p id="feedbackMsg" class="mt-2 text-success"></p>

</div>

<script src="script.js"></script>

</body>
</html>
