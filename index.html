<!DOCTYPE html>
<html>
<head>
  <title>Scheme Finder</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="container mt-5">

<h1 class="mb-3 text-center">Maharashtra Government Scheme Finder</h1>

<p class="text-center text-muted mb-2">
  This website is for educational purposes only.
</p>

<p class="text-center text-primary mb-4">
  🔍 Enter your details to find eligible schemes instantly
</p>

<div class="card p-4 shadow-sm">

<div class="mb-3">
  <label class="form-label">Income:</label>
  <input type="number" id="income" class="form-control" placeholder="Enter your annual income" oninput="findSchemes()">
</div>

<div class="mb-3">
  <label class="form-label">Caste Category:</label>
  <select id="caste" class="form-select" onchange="findSchemes()">
    <option value="">-- Select Caste --</option>
    <option value="general">General</option>
    <option value="obc">OBC</option>
    <option value="sc">SC</option>
    <option value="st">ST</option>
    <option value="vjnt">VJNT</option>
  </select>
</div>

<div class="mb-3">
  <label class="form-label">Disability:</label>
  <select id="disability" class="form-select" onchange="findSchemes()">
    <option value="no">No</option>
    <option value="yes">Yes</option>
  </select>
</div>

<div class="mb-3">
  <label class="form-label">Occupation:</label>
  <select id="occupation" class="form-select">
    <option value="">-- Select Occupation --</option>
    <option value="student">Student</option>
    <option value="farmer">Farmer</option>
  </select>
</div>

<button class="btn btn-primary mb-3 w-100" onclick="findSchemes()">
  Find Schemes
</button>

</div>

<h3>Scroll down</h3>

<div>

<h2 class="mt-4">Available Schemes:</h2>
<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
