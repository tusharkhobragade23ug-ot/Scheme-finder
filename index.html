<!DOCTYPE html>
<html>
<head>
  <title>Scheme Finder</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="container mt-5">

<h1 class="text-center">Maharashtra Government Scheme Finder</h1>

<p class="text-center text-muted">
  Enter your details to find eligible schemes
</p>

<div class="card p-4 shadow-sm">

  <div class="mb-3">
    <label class="form-label">Income:</label>
    <input type="number" id="income" class="form-control" placeholder="Enter income">
  </div>

  <div class="mb-3">
    <label class="form-label">Caste:</label>
    <select id="caste" class="form-select">
      <option value="">Select</option>
      <option value="general">General</option>
      <option value="obc">OBC</option>
      <option value="sc">SC</option>
      <option value="st">ST</option>
      <option value="vjnt">VJNT</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Disability:</label>
    <select id="disability" class="form-select">
      <option value="">Select</option>
      <option value="no">No</option>
      <option value="yes">Yes</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Occupation:</label>
    <select id="occupation" class="form-select">
      <option value="">Select</option>
      <option value="student">Student</option>
      <option value="farmer">Farmer</option>
    </select>
  </div>

  <button class="btn btn-primary w-100" onclick="findSchemes()">
    Find Schemes
    Results
  </button>

</div>
